services:
  vllm:
    image: vllm/vllm-openai:latest
    ports:
      - "${VLLM_PORT:-8000}:8000"
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    environment:
      HUGGING_FACE_HUB_TOKEN: "${HF_TOKEN:-}"
      HF_HUB_OFFLINE: "1"
    command: [
      "--model", "${VLLM_MODEL:-Qwen/Qwen3-8B}",
      "--served-model-name", "${VLLM_MODEL:-Qwen/Qwen3-8B}",
      "--dtype", "auto",
      "--gpu-memory-utilization", "0.10",
      "--max-model-len", "8192"
    ]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ipc: host
    restart: unless-stopped

  vibevoice:
    profiles: [vibevoice]
    build:
      context: .
      dockerfile: Dockerfile.vibevoice
    ports:
      - "${VIBEVOICE_PORT:-8001}:8001"
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    environment:
      HUGGING_FACE_HUB_TOKEN: "${HF_TOKEN:-}"
      HF_HUB_OFFLINE: "1"
      VIBEVOICE_MODEL: "${VIBEVOICE_MODEL:-microsoft/VibeVoice-ASR}"
      VIBEVOICE_PORT: "8001"
      VIBEVOICE_GPU_UTIL: "${VIBEVOICE_GPU_UTIL:-0.60}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ipc: host
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:0.6.3
    ports:
      - "${CHROMA_PORT:-8010}:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"
    restart: unless-stopped

volumes:
  chroma_data:
    # Named volume — data survives container restarts and re-creates.
    # To wipe all indexed audio: docker compose down -v
